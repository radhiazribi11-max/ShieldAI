<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ShieldAI Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body { background-color: #050a18; color: #e2e8f0; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-slate-900/80 border border-sky-500/10 w-full max-w-md p-10 rounded-[40px] shadow-2xl">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-black text-white italic">🛡️ SHIELD<span class="text-sky-400">AI</span></h2>
            <p class="text-slate-500 text-[10px] mt-2 uppercase tracking-[0.3em] font-bold">Secure Access Gateway</p>
        </div>
        <form class="space-y-6">
            <input type="email" placeholder="Enterprise Email" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm outline-none focus:border-sky-500 transition-all">
            <button type="button" onclick="window.location.href='dashboard.html'" class="w-full bg-sky-600 hover:bg-sky-500 py-4 rounded-2xl font-black text-white shadow-lg transition-all">ACCESS DASHBOARD</button>
        </form>
        <div class="mt-8 text-center">
            <a href="index.html" class="text-[10px] text-slate-500 hover:text-white uppercase font-bold tracking-widest">← Back to Homepage</a>
        </div>
    </div>
</body>
</html>
