<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldAI | Governance Dashboard</title>
    <style>
        :root { --bg: #050505; --card: #0c0c0c; --primary: #0070f3; --accent: #00dfd8; --border: #1a1a1a; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); padding: 40px 20px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 40px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .chat-container { flex: 1; background: #080808; border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; padding: 25px; overflow-y: auto; }
        .input-box { padding: 20px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid var(--border); }
        input { flex: 1; background: #151515; border: 1px solid #222; color: white; padding: 15px; border-radius: 10px; }
        button { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .pii-tag { color: var(--accent); font-size: 0.75rem; font-weight: bold; margin: 5px 0; }
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div style="text-align:center; background:var(--card); padding:40px; border-radius:20px; border:1px solid var(--border);">
            <h2 style="color:var(--accent)">🛡️ ShieldAI Login</h2>
            <input type="password" id="sk_key" placeholder="Enter License Key (sk_live_...)" style="width:300px; margin-bottom:15px;">
            <button onclick="login()" style="width:100%">Verify System</button>
        </div>
    </div>

    <div class="sidebar">
        <h2 style="color: var(--accent);">ShieldAI</h2>
        <div style="margin-top:20px; font-size:0.8rem; color:#666;">ENTERPRISE EDITION</div>
        <nav style="margin-top:50px; display:flex; flex-direction:column; gap:20px;">
            <div style="color:var(--primary)">● Real-time Firewall</div>
            <div style="color:#444">○ API Management</div>
            <div style="color:#444">○ Compliance Logs</div>
        </nav>
        <button onclick="downloadReport()" style="margin-top:auto; background:#111;">📥 Export Audit PDF</button>
    </div>

    <div class="main">
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
            <div class="stat-card"><small>PII BLOCKED</small><div id="pii-stat" style="font-size:2rem; color:var(--accent)">0</div></div>
            <div class="stat-card"><small>RISK SAVED</small><div style="font-size:2rem;">$4.2k</div></div>
            <div class="stat-card"><small>POLICY</small><div style="font-size:2rem; color:#27ae60;">Active</div></div>
        </div>

        <div class="chat-container">
            <div id="chat-flow"></div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Type a message to test privacy filters...">
                <button onclick="send()">SECURE SEND</button>
            </div>
        </div>
    </div>

    <script>
        let piiCount = 0;
        let license = "";

        function login() {
            const key = document.getElementById('sk_key').value;
            if(key.startsWith('sk_live')) {
                license = key;
                document.getElementById('auth-overlay').style.display = 'none';
            } else { alert("Invalid License"); }
        }

        function scrub(text) {
            const rules = { EMAIL: /[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/gi, PHONE: /\+?\d{10,15}/g };
            let clean = text; let hit = false;
            for(let [type, reg] of Object.entries(rules)) {
                if(reg.test(clean)) {
                    clean = clean.replace(reg, `[HIDDEN_${type}]`);
                    hit = true; piiCount++;
                }
            }
            return { clean, hit };
        }

        async function send() {
            const inp = document.getElementById('userInput');
            const flow = document.getElementById('chat-flow');
            const { clean, hit } = scrub(inp.value);

            flow.innerHTML += `<div style="text-align:right; margin-bottom:15px;">${inp.value}</div>`;
            if(hit) {
                flow.innerHTML += `<div class="pii-tag">🛡️ ShieldAI: Masked sensitive data for GDPR compliance</div>`;
                document.getElementById('pii-stat').innerText = piiCount;
            }

            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: clean, licenseKey: license })
            });
            const data = await response.json();
            
            flow.innerHTML += `<div style="background:#161616; padding:15px; border-radius:10px; margin-bottom:15px;">${data.reply || data.error}</div>`;
            inp.value = "";
            flow.scrollTop = flow.scrollHeight;
        }

        function downloadReport() {
            const text = `SHIELDAI AUDIT LOG\nDate: ${new Date()}\nBlocked Events: ${piiCount}\nStatus: Secure`;
            const blob = new Blob([text], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "Audit_Report.txt"; a.click();
        }
    </script>
</body>
</html>
