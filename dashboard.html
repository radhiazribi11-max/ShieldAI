<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldAI | Secure Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(56, 189, 248, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10 pb-4 border-b border-sky-500/20">
            <div class="text-2xl font-black text-white italic">🛡️ SHIELD<span class="text-sky-400">AI</span></div>
            <button onclick="window.location.href='index.html'" class="text-[10px] bg-slate-800 px-6 py-2 rounded-full border border-slate-700 font-bold hover:bg-red-900/20 transition-colors uppercase">Logout</button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
            <div class="glass-card p-5 rounded-3xl">
                <span class="text-slate-500 text-[9px] uppercase block mb-2 font-bold tracking-widest">Leaks Intercepted</span>
                <span id="blockedCount" class="text-3xl font-black text-red-500 italic">0</span>
            </div>
            <div class="glass-card p-5 rounded-3xl">
                <span class="text-slate-500 text-[9px] uppercase block mb-2 font-bold tracking-widest">Available Credits</span>
                <span id="usageStatus" class="text-2xl font-black text-sky-400 italic">---</span>
            </div>
            <div class="glass-card p-5 rounded-3xl">
                <span class="text-slate-500 text-[9px] uppercase block mb-2 font-bold tracking-widest">Plan Type</span>
                <span id="planType" class="text-[10px] bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full font-bold uppercase">Free Tier</span>
            </div>
            <div class="glass-card p-5 rounded-3xl flex items-center justify-center">
                <button onclick="downloadPDF()" class="text-sky-400 text-[10px] font-black uppercase hover:underline"><i class="fas fa-download mr-1"></i> Audit Report</button>
            </div>
        </div>

        <div class="glass-card rounded-[40px] p-6 h-[65vh] flex flex-col shadow-2xl">
            <div id="chatBox" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-4 custom-scroll">
                <div class="text-center text-[10px] text-sky-500/50 italic py-2 border-b border-sky-500/5 mb-4 uppercase tracking-[0.2em]">Secure Session Established - AES 256</div>
            </div>
            <div class="pt-4 border-t border-slate-800 space-y-4">
                <input id="license" type="password" placeholder="License Key (sk_...)" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-xs outline-none focus:border-sky-500 transition-all">
                <div class="flex gap-2">
                    <input id="userInput" type="text" placeholder="Type your secure prompt..." class="flex-1 bg-slate-950 border border-slate-800 px-5 py-3 rounded-xl text-xs outline-none focus:border-sky-500 transition-all">
                    <button onclick="sendMessage()" class="bg-sky-600 hover:bg-sky-500 px-8 rounded-xl transition-all shadow-lg shadow-sky-900/40"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
      window.$crisp=[]; window.CRISP_WEBSITE_ID="525c7845-cadb-44e2-96b3-ae84e645661b";
      (function(){ d=document; s=d.createElement("script"); s.src="https://client.crisp.chat/l.js"; s.async=1; d.getElementsByTagName("head")[0].appendChild(s); })();
    </script>

    <script>
        let auditLogs = [];
        async function sendMessage() {
            const prompt = document.getElementById('userInput').value;
            const key = document.getElementById('license').value;
            if(!prompt || !key) return alert("Fill all fields.");
            
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="flex justify-end"><div class="max-w-[80%] bg-slate-800 p-4 rounded-2xl rounded-tr-none text-xs">User: ${prompt}</div></div>`;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt, licenseKey: key })
                });
                const data = await res.json();
                if(data.error) return alert(data.error);

                document.getElementById('usageStatus').innerText = data.usage.max - data.usage.current;
                document.getElementById('planType').innerText = (data.usage.max > 500) ? 'PRO ACCOUNT' : 'FREE TIER';
                
                chatBox.innerHTML += `<div class="flex justify-start mt-4"><div class="max-w-[80%] bg-sky-900/20 border border-sky-500/20 p-4 rounded-2xl rounded-tl-none text-xs text-sky-100">ShieldAI: ${data.reply}</div></div>`;
                
                if(data.shielded) {
                    document.getElementById('blockedCount').innerText = parseInt(document.getElementById('blockedCount').innerText) + 1;
                }

                auditLogs.unshift({ time: new Date().toLocaleString(), status: data.shielded ? 'REDACTED' : 'CLEAN', text: prompt.substring(0, 30) + '...' });
                chatBox.scrollTop = chatBox.scrollHeight;
                document.getElementById('userInput').value = "";
            } catch (e) { alert("Check Connection."); }
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("ShieldAI Security Audit", 20, 20);
            auditLogs.forEach((l, i) => doc.text(`${l.time} - [${l.status}] - ${l.text}`, 20, 30 + (i*10)));
            doc.save("ShieldAI-Audit.pdf");
        }
    </script>
</body>
                  </html>
