<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ShieldAI Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: #050a18; 
            color: #e2e8f0; 
            font-family: sans-serif; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: screen;
        }
        .login-card { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(56, 189, 248, 0.1); 
        }
        .input-field { 
            background: #0f172a; 
            border: 1px solid #1e293b; 
            transition: all 0.3s; 
        }
        .input-field:focus { 
            border-color: #38bdf8; 
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); 
        }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-sky-900/20 via-slate-950 to-slate-950">

    <div class="flex flex-col items-center w-full max-w-md px-6">
        <div class="mb-10 text-center">
            <div class="text-3xl font-black tracking-tighter text-white italic mb-2">🛡️ SHIELD<span class="text-sky-400">AI</span></div>
            <div class="h-1 w-12 bg-sky-500 mx-auto rounded-full"></div>
        </div>

        <div class="login-card w-full p-10 rounded-[40px] shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-2 text-center">Welcome Back</h2>
            <p class="text-slate-500 text-xs text-center mb-10 uppercase tracking-widest font-bold">Encrypted Session Entry</p>
            
            <form class="space-y-6">
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 text-sm"></i>
                    <input type="email" placeholder="Enterprise Email" class="input-field w-full pl-12 pr-4 py-4 rounded-2xl text-sm outline-none text-white">
                </div>
                
                <button type="button" onclick="window.location.href='dashboard.html'" class="w-full bg-sky-600 hover:bg-sky-500 py-4 rounded-2xl font-black text-sm text-white shadow-lg shadow-sky-900/40 transition-all transform hover:scale-[1.02]">
                    ACCESS DASHBOARD
                </button>
            </form>

            <div class="mt-8 flex items-center justify-between text-[10px] text-slate-500 font-bold uppercase tracking-widest px-2">
                <a href="index.html" class="hover:text-white transition">← Back to Site</a>
                <span class="text-slate-700">|</span>
                <a href="privacy.html" class="hover:text-white transition">Security Protocol</a>
            </div>
        </div>

        <p class="mt-10 text-[9px] text-slate-600 uppercase tracking-[0.3em]">Authorized Personnel Only</p>
    </div>

</body>
</html>
