<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldAI | Secure Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="border-b border-gray-800 p-4 bg-gray-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">ShieldAI</h1>
            <div id="user-info" class="text-sm text-gray-400">Loading account data...</div>
        </div>
    </nav>

    <main class="container mx-auto p-6 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
                <p class="text-gray-400 text-sm">Total Request Limit</p>
                <h3 id="max-limit" class="text-3xl font-bold mt-2 text-white">5,000</h3>
            </div>
            <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl border-l-4 border-l-blue-500">
                <p class="text-gray-400 text-sm">Used Requests</p>
                <h3 id="usage-count" class="text-3xl font-bold mt-2 text-blue-400">0</h3>
            </div>
            <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl border-l-4 border-l-emerald-500">
                <p class="text-gray-400 text-sm">Remaining Credits</p>
                <h3 id="remaining" class="text-3xl font-bold mt-2 text-emerald-400">---</h3>
            </div>
        </div>

        <div class="bg-gray-800 rounded-3xl border border-gray-700 overflow-hidden flex flex-col h-[550px] shadow-2xl">
            <div class="bg-gray-700/30 p-4 border-b border-gray-700 flex justify-between items-center">
                <span class="flex items-center gap-2 text-sm font-medium">
                    <i class="fas fa-user-shield text-emerald-400"></i> Privacy Shield Active
                </span>
                <span class="text-[10px] uppercase tracking-widest bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full border border-emerald-500/20 font-bold">
                    Zero Storage Policy
                </span>
            </div>
            
            <div id="chat-box" class="flex-1 p-6 overflow-y-auto space-y-4 text-sm scrollbar-thin scrollbar-thumb-gray-600">
                <div class="bg-blue-500/10 border border-blue-500/20 p-4 rounded-2xl text-blue-200">
                    <i class="fas fa-info-circle mr-2"></i> Welcome! Enter any text below. <strong>ShieldAI</strong> will automatically redact PII (Emails, Phones) before processing your request.
                </div>
            </div>

            <div class="p-4 bg-gray-900/40 border-t border-gray-700">
                <div class="flex gap-4">
                    <input id="user-input" type="text" placeholder="Type your message (e.g., Send email to john@example.com)..." 
                        class="flex-1 bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition-all text-sm">
                    <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-600/20 flex items-center gap-2">
                        <span>Send</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Use the License Key from Login or fallback to Admin for testing
        const licenseKey = localStorage.getItem('shield_key') || 'admin123';
        
        // Supabase Configuration
        const supabaseUrl = 'https://xjjuvagvfaocvszztkgh.supabase.co';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY'; // REPLACE WITH YOUR ACTUAL ANON KEY
        const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

        async function loadUserData() {
            const { data, error } = await supabase
                .from('usage_tracking')
                .select('*')
                .eq('license_key', licenseKey)
                .single();

            if (data) {
                document.getElementById('usage-count').innerText = data.usage_count.toLocaleString();
                document.getElementById('max-limit').innerText = data.max_limit.toLocaleString();
                document.getElementById('remaining').innerText = (data.max_limit - data.usage_count).toLocaleString();
                document.getElementById('user-info').innerText = `Active Session: ${data.email || 'Admin User'}`;
            } else {
                document.getElementById('user-info').innerText = "Trial Mode (No active license found)";
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if(!input.value) return;

            // Display User Message
            const userMsg = input.value;
            chatBox.innerHTML += `<div class="bg-gray-700 p-3 rounded-xl ml-auto max-w-[85%] text-right">${userMsg}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Call Vercel API
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: userMsg, licenseKey: licenseKey })
                });

                const result = await response.json();
                
                // Display ShieldAI Secure Response
                if (result.reply) {
                    chatBox.innerHTML += `
                        <div class="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-xl mr-auto max-w-[85%]">
                            <p class="text-emerald-400 font-bold mb-1"><i class="fas fa-check-circle"></i> Secure Response:</p>
                            <p class="text-emerald-50 text-xs">${result.reply}</p>
                        </div>
                    `;
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                chatBox.innerHTML += `<div class="bg-red-500/10 border border-red-500/20 p-3 rounded-xl text-red-400 text-xs">Error: ${err.message}</div>`;
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
            loadUserData(); // Refresh stats automatically
        }

        // Initialize Data on load
        loadUserData();
    </script>
</body>
</html>
