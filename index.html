<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldAI | Enterprise Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-border { border-bottom: 2px solid #38bdf8; box-shadow: 0 4px 15px -5px #38bdf8; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 pb-4 neon-border">
            <h1 class="text-3xl font-bold text-sky-400"><i class="fas fa-shield-halved"></i> ShieldAI <span class="text-sm font-light text-slate-400">v2.0</span></h1>
            <div class="flex gap-4">
                <button onclick="showSection('policies')" class="px-4 py-2 glass rounded-lg hover:bg-sky-600 transition"><i class="fas fa-user-shield"></i> Security Policies</button>
                <button onclick="showSection('audit')" class="px-4 py-2 glass rounded-lg hover:bg-sky-600 transition"><i class="fas fa-history"></i> Audit History</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-6 rounded-2xl">
                    <h3 class="text-slate-400 mb-2">Leaks Blocked</h3>
                    <p id="blockedCount" class="text-5xl font-bold text-red-500">0</p>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <h3 class="text-slate-400 mb-2">Security Status</h3>
                    <p class="text-2xl font-bold text-emerald-400"><i class="fas fa-check-circle"></i> Active Shield</p>
                </div>
            </div>

            <div id="main-section" class="lg:col-span-2 glass rounded-2xl p-6 h-[500px] flex flex-col">
                <div id="chatBox" class="flex-1 overflow-y-auto mb-4 space-y-4 p-2 text-sm">
                    <div class="bg-slate-800 p-3 rounded-lg border-r-4 border-sky-500">Welcome Admin. ShieldAI is monitoring all outgoing PII data.</div>
                </div>
                <div class="flex gap-2">
                    <input id="license" type="password" placeholder="License Key" class="w-1/4 bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-sky-500">
                    <input id="userInput" type="text" placeholder="Type sensitive prompt..." class="flex-1 bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none focus:border-sky-500">
                    <button onclick="sendMessage()" class="bg-sky-600 hover:bg-sky-500 px-6 py-3 rounded-xl transition font-bold">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="glass max-w-2xl w-full p-8 rounded-3xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('shieldLogs') || '[]');

        async function sendMessage() {
            const prompt = document.getElementById('userInput').value;
            const key = document.getElementById('license').value;
            if(!prompt || !key) return alert("Missing Input");

            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="text-sky-300"><b>You:</b> ${prompt}</div>`;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt, licenseKey: key })
                });
                const data = await res.json();

                // تحديث العداد
                if(data.security) {
                    document.getElementById('blockedCount').innerText = data.security.blocked;
                    if(data.shielded) {
                        chatBox.innerHTML += `<div class="text-red-400 text-xs italic"><i class="fas fa-user-secret"></i> ShieldAI intercepted sensitive data!</div>`;
                    }
                }

                chatBox.innerHTML += `<div class="bg-slate-700 p-3 rounded-lg"><b>AI:</b> ${data.reply}</div>`;
                
                // حفظ في السجل (Audit History)
                history.push({ date: new Date().toLocaleString(), prompt, status: data.shielded ? 'REDACTED' : 'CLEAN' });
                localStorage.setItem('shieldLogs', JSON.stringify(history));

                chatBox.scrollTop = chatBox.scrollHeight;
                document.getElementById('userInput').value = "";
            } catch (e) {
                alert("Connection Error");
            }
        }

        function showSection(type) {
            const overlay = document.getElementById('modalOverlay');
            const content = document.getElementById('modalContent');
            overlay.classList.remove('hidden');

            if(type === 'policies') {
                content.innerHTML = `
                    <h2 class="text-2xl font-bold mb-4 text-sky-400">📜 Security Policies</h2>
                    <ul class="space-y-3">
                        <li class="p-3 bg-slate-800 rounded-lg">✅ <b>PII Masking:</b> Automatic redaction of Emails, Phones, and Keys.</li>
                        <li class="p-3 bg-slate-800 rounded-lg">✅ <b>Model Guard:</b> All requests routed via Groq secure tunnel.</li>
                        <li class="p-3 bg-slate-800 rounded-lg">✅ <b>Zero-Logs:</b> Raw prompt data is never stored on disk.</li>
                    </ul>
                `;
            } else if(type === 'audit') {
                let logHtml = history.map(h => `
                    <div class="flex justify-between border-b border-slate-700 py-2 text-xs">
                        <span>${h.date}</span>
                        <span class="${h.status === 'REDACTED' ? 'text-red-400' : 'text-emerald-400'}">${h.status}</span>
                    </div>
                `).join('') || "No history yet.";
                content.innerHTML = `
                    <h2 class="text-2xl font-bold mb-4 text-sky-400">📜 Audit History</h2>
                    <div class="max-h-60 overflow-y-auto">${logHtml}</div>
                `;
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
        }
    </script>
</body>
</html>
