<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldAI | Enterprise Privacy Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(56, 189, 248, 0.1); }
        .neon-border { border-bottom: 2px solid #38bdf8; box-shadow: 0 4px 15px -5px #38bdf8; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 pb-4 neon-border">
            <h1 class="text-2xl font-bold text-sky-400 flex items-center gap-2">
                <i class="fas fa-shield-halved"></i> SHIELD-AI
            </h1>
            <div class="flex gap-2">
                <button onclick="openModal('policies')" class="text-[10px] bg-slate-800 px-3 py-2 rounded-lg border border-slate-700 hover:border-sky-500 transition">
                    <i class="fas fa-user-shield"></i> Security Policies
                </button>
                <button onclick="openModal('audit')" class="text-[10px] bg-slate-800 px-3 py-2 rounded-lg border border-slate-700 hover:border-sky-500 transition">
                    <i class="fas fa-history"></i> Audit History
                </button>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
            <div class="glass-card p-4 rounded-2xl text-center">
                <span class="text-slate-500 text-[10px] uppercase block mb-1">Leaks Blocked</span>
                <span id="blockedCount" class="text-3xl font-black text-red-500">0</span>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center">
                <span class="text-slate-500 text-[10px] uppercase block mb-1">Remaining Credits</span>
                <span id="usageStatus" class="text-xl font-bold text-sky-400">Loading...</span>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center hidden md:block">
                <span class="text-slate-500 text-[10px] uppercase block mb-1">Shield Status</span>
                <span class="text-emerald-400 text-sm font-bold flex items-center justify-center gap-1">
                    <i class="fas fa-circle text-[8px] animate-pulse"></i> ACTIVE
                </span>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-4 flex flex-col h-[60vh] md:h-[500px]">
            <div id="chatBox" class="flex-1 overflow-y-auto space-y-4 mb-4 text-sm scrollbar-hide">
                <div class="bg-blue-900/20 text-blue-200 p-3 rounded-2xl border border-blue-800/30 text-[10px] text-center italic">
                    Encryption Active. All PII data is being redacted in real-time.
                </div>
            </div>
            
            <div class="space-y-3">
                <input id="license" type="password" placeholder="Enter License Key (e.g. admin123)" class="w-full bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-sky-500 transition">
                <div class="flex gap-2">
                    <input id="userInput" type="text" placeholder="Type your secure prompt..." class="flex-1 bg-slate-900/50 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-sky-500 transition">
                    <button onclick="sendMessage()" class="bg-sky-600 hover:bg-sky-500 px-6 rounded-xl transition shadow-lg shadow-sky-900/20">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="text-center">
                    <a href="pricing.html" class="text-[10px] text-slate-500 hover:text-sky-400 underline transition tracking-widest uppercase">Upgrade to PRO Plan</a>
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-black/90 hidden z-50 items-center justify-center p-6 backdrop-blur-sm">
        <div class="glass-card w-full max-w-md p-6 rounded-3xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white text-2xl">&times;</button>
            <h2 id="modalTitle" class="text-xl font-bold text-sky-400 mb-6 font-mono"></h2>
            <div id="modalBody" class="text-sm space-y-3 max-h-[60vh] overflow-y-auto pr-2 scrollbar-hide"></div>
        </div>
    </div>

    <script>
        let localAudit = JSON.parse(localStorage.getItem('shieldLogs') || '[]');

        async function sendMessage() {
            const prompt = document.getElementById('userInput').value;
            const key = document.getElementById('license').value;
            const chatBox = document.getElementById('chatBox');

            if(!prompt || !key) return alert("Please provide both message and License Key!");

            chatBox.innerHTML += `<div class="text-left mr-12"><span class="inline-block bg-slate-700/50 p-3 rounded-2xl rounded-tl-none text-xs border border-slate-600/30">You: ${prompt}</span></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt, licenseKey: key })
                });
                const data = await res.json();

                if(data.error) {
                    alert(data.error);
                } else {
                    document.getElementById('usageStatus').innerText = `${data.usage.max - data.usage.current} Requests Left`;
                    chatBox.innerHTML += `<div class="text-right ml-12 mt-2"><span class="inline-block bg-sky-600/20 text-sky-100 p-3 rounded-2xl rounded-tr-none text-xs border border-sky-500/20">AI: ${data.reply}</span></div>`;
                    
                    if(data.shielded) {
                        document.getElementById('blockedCount').innerText = parseInt(document.getElementById('blockedCount').innerText) + 1;
                        chatBox.innerHTML += `<div class="text-red-400 text-[9px] italic text-center animate-pulse"><i class="fas fa-user-secret"></i> ShieldAI intercepted sensitive data!</div>`;
                    }

                    localAudit.unshift({ time: new Date().toLocaleTimeString(), status: data.shielded ? 'REDACTED' : 'CLEAN', text: prompt.substring(0, 30) + '...' });
                    localStorage.setItem('shieldLogs', JSON.stringify(localAudit.slice(0, 20)));
                }
                
                chatBox.scrollTop = chatBox.scrollHeight;
                document.getElementById('userInput').value = "";
            } catch (e) {
                alert("Connection Error. Ensure Supabase Query is executed.");
            }
        }

        function openModal(type) {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            if(type === 'policies') {
                title.innerText = "Security Policies";
                body.innerHTML = `
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700"><b>PII Masking:</b> Real-time removal of emails, phones, and private keys.</div>
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700"><b>Engine:</b> Secured via Groq LPU High-Speed Tunnel.</div>
                    <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700"><b>Zero Storage:</b> We never store your raw prompts or AI replies.</div>
                `;
            } else {
                title.innerText = "Audit History";
                body.innerHTML = localAudit.map(l => `
                    <div class="flex justify-between items-center border-b border-slate-700/50 py-2">
                        <span class="text-[10px] text-slate-500">${l.time}</span>
                        <span class="text-[10px] flex-1 px-4 truncate">${l.text}</span>
                        <span class="${l.status === 'REDACTED' ? 'text-red-400' : 'text-emerald-400'} text-[9px] font-bold">${l.status}</span>
                    </div>
                `).join('') || '<p class="text-center text-slate-500">No logs found yet.</p>';
            }
        }

        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
        }
    </script>
</body>
</html>
