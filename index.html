<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldAI | Professional Privacy Layer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(56, 189, 248, 0.1); }
        .neon-border { border-bottom: 2px solid #38bdf8; box-shadow: 0 4px 15px -5px #38bdf8; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 pb-4 neon-border">
            <h1 class="text-2xl font-bold text-sky-400 flex items-center gap-2">🛡️ SHIELD-AI</h1>
            <div class="flex gap-2">
                <button onclick="openModal('policies')" class="text-[10px] bg-slate-800 px-3 py-2 rounded-lg border border-slate-700">Security Policies</button>
                <button onclick="openModal('audit')" class="text-[10px] bg-slate-800 px-3 py-2 rounded-lg border border-slate-700">Audit Log</button>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass-card p-4 rounded-2xl text-center border-red-900/20">
                <span class="text-slate-500 text-[10px] uppercase block">Data Leaks Blocked</span>
                <span id="blockedCount" class="text-3xl font-black text-red-500">0</span>
            </div>
            <div class="glass-card p-4 rounded-2xl text-center border-sky-900/20">
                <span class="text-slate-500 text-[10px] uppercase block">Credits Remaining</span>
                <span id="usageStatus" class="text-xl font-bold text-sky-400">Syncing...</span>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-4 flex flex-col h-[60vh] md:h-[500px]">
            <div id="chatBox" class="flex-1 overflow-y-auto space-y-4 mb-4 text-sm pr-2">
                <div class="bg-blue-900/10 text-blue-300 p-3 rounded-xl border border-blue-800/20 text-[10px] text-center">
                    AES-256 Encryption active. Sensitive data is redacted locally.
                </div>
            </div>
            
            <div class="space-y-3">
                <input id="license" type="password" placeholder="Enter License Key (e.g. sk_7f2x...)" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-sky-500">
                <div class="flex gap-2">
                    <input id="userInput" type="text" placeholder="Type secure prompt..." class="flex-1 bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-sky-500">
                    <button onclick="sendMessage()" class="bg-sky-600 hover:bg-sky-500 px-6 rounded-xl transition shadow-lg shadow-sky-900/40">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="text-center">
                    <a href="https://Radhiayt.gumroad.com/l/ofuefu" target="_blank" class="text-[9px] text-slate-500 hover:text-sky-400 underline tracking-widest uppercase">Get Unlimited Pro Access</a>
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-black/90 hidden z-50 items-center justify-center p-6 backdrop-blur-sm">
        <div class="glass-card w-full max-w-md p-6 rounded-3xl relative border-sky-500/30">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 text-2xl">&times;</button>
            <h2 id="modalTitle" class="text-xl font-bold text-sky-400 mb-6"></h2>
            <div id="modalBody" class="text-sm space-y-3 max-h-[50vh] overflow-y-auto"></div>
            <div id="modalFooter"></div>
        </div>
    </div>

    <script>
        let localAudit = JSON.parse(localStorage.getItem('shieldLogs') || '[]');

        async function sendMessage() {
            const prompt = document.getElementById('userInput').value;
            const key = document.getElementById('license').value;
            if(!prompt || !key) return alert("Missing input!");

            document.getElementById('chatBox').innerHTML += `<div class="text-left"><span class="inline-block bg-slate-800 p-3 rounded-2xl rounded-tl-none text-xs border border-slate-700">You: ${prompt}</span></div>`;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt, licenseKey: key })
                });
                const data = await res.json();

                if(data.error) {
                    alert(data.error);
                } else {
                    document.getElementById('usageStatus').innerText = `${data.usage.max - data.usage.current} Credits`;
                    document.getElementById('chatBox').innerHTML += `<div class="text-right mt-2"><span class="inline-block bg-sky-600/20 text-sky-100 p-3 rounded-2xl rounded-tr-none text-xs border border-sky-500/20">AI: ${data.reply}</span></div>`;
                    
                    if(data.shielded) {
                        document.getElementById('blockedCount').innerText = parseInt(document.getElementById('blockedCount').innerText) + 1;
                    }

                    localAudit.unshift({ time: new Date().toLocaleString(), status: data.shielded ? 'REDACTED' : 'CLEAN', text: prompt.substring(0, 40) + '...' });
                    localStorage.setItem('shieldLogs', JSON.stringify(localAudit.slice(0, 20)));
                }
                document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
                document.getElementById('userInput').value = "";
            } catch (e) { alert("Server Error. Check Database."); }
        }

        function openModal(type) {
            document.getElementById('modalOverlay').classList.replace('hidden', 'flex');
            const body = document.getElementById('modalBody');
            const footer = document.getElementById('modalFooter');
            
            if(type === 'policies') {
                document.getElementById('modalTitle').innerText = "Security Policies";
                body.innerHTML = `<div class="p-3 bg-slate-800 rounded-xl">PII Redaction: 100% locally handled.</div>`;
                footer.innerHTML = "";
            } else {
                document.getElementById('modalTitle').innerText = "Security Audit History";
                body.innerHTML = localAudit.map(l => `<div class="flex justify-between py-2 border-b border-slate-800"><span>${l.text}</span><b class="${l.status==='CLEAN'?'text-green-400':'text-red-400'}">${l.status}</b></div>`).join('');
                footer.innerHTML = `<button onclick="downloadPDF()" class="w-full mt-4 bg-emerald-600 p-3 rounded-xl font-bold text-xs"><i class="fas fa-file-pdf"></i> Export Official Security Report</button>`;
            }
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text("ShieldAI Security Audit Report", 10, 20);
            doc.setFontSize(10); doc.text(`Generated on: ${new Date().toLocaleString()}`, 10, 30);
            let y = 40;
            localAudit.forEach(log => {
                doc.text(`${log.time} - ${log.status}: ${log.text}`, 10, y);
                y += 10;
            });
            doc.save("ShieldAI-Security-Report.pdf");
        }

        function closeModal() { document.getElementById('modalOverlay').classList.replace('flex', 'hidden'); }
    </script>
</body>
</html>
